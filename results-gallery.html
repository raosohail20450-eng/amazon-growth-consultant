<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
  --amazon: #FF9900;
  --amazon-dark: #e68a00;
  --navy: #0A1628;
  --navy-mid: #0D1F3C;
  --navy-light: #162947;
  --slate: #1E3A5F;
  --text: #FFFFFF;
  --text-muted: #8BA3C7;
  --text-dim: #4A6FA5;
  --card-bg: rgba(22,41,71,0.7);
  --border: rgba(255,153,0,0.15);
  --border-subtle: rgba(139,163,199,0.1);
  --glow: rgba(255,153,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}
/* ── CANVAS ── */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}
/* ── CURSOR ── */
.cursor {
  width: 20px; height: 20px;
  border: 2px solid var(--amazon);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease, background 0.2s;
  transform: translate(-50%, -50%);
}
.cursor-dot {
  width: 5px; height: 5px;
  background: var(--amazon);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.05s;
}
.cursor.hover { transform: translate(-50%,-50%) scale(2.2); background: rgba(255,153,0,0.15); }
/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--amazon); border-radius: 4px; }

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#081221;
overflow-x:hidden;
font-family:Arial,sans-serif;
color:white;
position:relative;
min-height:100vh;
}
.gallery{
width:90%;
margin:60px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
position:relative;
z-index:2;
}

.gallery img{
width:100%;
border-radius:20px;
cursor:pointer;
transition:.5s;
box-shadow:0 10px 40px rgba(0,0,0,.5);
border:2px solid rgba(255,255,255,.1);
}

.gallery img:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 40px rgba(255,153,0,.5);
}
/* ── TESTIMONIALS ── */
#testimonials { background: rgba(13,31,60,0.4); }
.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 60px;
}
.testi-card {
  background: var(--card-bg);
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  padding: 30px;
  transition: all 0.3s;
  backdrop-filter: blur(20px);
  cursor: default;
}
.testi-card:hover { border-color: var(--border); transform: translateY(-4px); }
.testi-stars { color: var(--amazon); font-size: 14px; margin-bottom: 16px; letter-spacing: 2px; }
.testi-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}
.testi-image{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:15px;
  margin-bottom:15px;
}

.testi-text{
  color:#ccc;
  line-height:1.7;
  font-size:15px;
}
.heading{
    text-align:center;
    margin-top:80px;
    margin-bottom:50px;
    position:relative;
    z-index:2;
}

.section-label{
    color:#FF9900;
    font-size:14px;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:15px;
}

.section-title{
    font-size:50px;
    margin-bottom:20px;
    color:white;
}

.section-desc{
    color:#8BA3C7;
    max-width:700px;
    margin:auto;
    line-height:1.8;
    font-size:17px;
}
/* Animated background */

body::before{
content:'';
position:fixed;
width:600px;
height:600px;
background:rgba(255,153,0,.15);
border-radius:50%;
filter:blur(120px);
top:-150px;
left:-150px;
animation:move1 12s infinite alternate ease-in-out;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:rgba(0,140,255,.15);
border-radius:50%;
filter:blur(120px);
right:-100px;
bottom:-100px;
animation:move2 10s infinite alternate ease-in-out;
}
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(15px);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
visibility:hidden;
opacity:0;
transition:.4s;
}

.lightbox.active{
visibility:visible;
opacity:1;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:20px;
transition:.2s;
cursor:grab;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}
@keyframes move1{
from{
transform:translate(0,0);
}
to{
transform:translate(150px,100px);
}
}

@keyframes move2{
from{
transform:translate(0,0);
}
to{
transform:translate(-150px,-100px);
}
}



</style>
</head>
<body>
<section class="heading">
    <div class="section-label">Case Studies</div>

    <h2 class="section-title">
        Performance Results
    </h2>

    <p class="section-desc">
        Sales dashboard snapshots and performance highlights from various Amazon stores across multiple marketplaces.
    </p>
</section>
<div class="gallery">
<img src="r1.jpeg">
<img src="r2.jpeg">
<img src="r3.jpeg">
<img src="r4.jpeg">
<img src="r5.jpeg">
<img src="r6.jpeg">
</div>
<!-- Custom Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Canvas -->
<canvas id="bg-canvas"></canvas>

<script>

// ── CUSTOM CURSOR ──
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let cursorX = 0, cursorY = 0, dotX = 0, dotY = 0;
document.addEventListener('mousemove', e => { cursorX = e.clientX; cursorY = e.clientY; });
function animateCursor() {
  dotX += (cursorX - dotX) * 0.15;
  dotY += (cursorY - dotY) * 0.15;
  cursor.style.left = dotX + 'px';
  cursor.style.top = dotY + 'px';
  cursorDot.style.left = cursorX + 'px';
  cursorDot.style.top = cursorY + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();
document.querySelectorAll('img, button, a').forEach(el => {

  el.addEventListener('mouseenter', () => {
    cursor.classList.add('hover');
  });

  el.addEventListener('mouseleave', () => {
    cursor.classList.remove('hover');
  });

});
// ── TESTIMONIALS RENDER ──

function renderTestimonials() {
  const grid = document.getElementById('testiGrid');

  grid.innerHTML = testimonials.map(t => `
    <div class="testi-card reveal">

      <a href="${t.link}" target="_blank">
        <img src="${t.image}" class="testi-image">
      </a>

      <p class="testi-text">${t.text}</p>

    </div>
  `).join('');
} 
</script>

<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img src="" id="lightbox-img">
</div>

<style>
/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.4s;
z-index:99999;
overflow:hidden;
}

.lightbox.active{
visibility:visible;
opacity:1;
}

.lightbox img{
max-width:85%;
max-height:85%;
border-radius:20px;
cursor:grab;
transition:.1s;
user-select:none;
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:50px;
color:white;
cursor:pointer;
}
</style>

<script>
// ===== LIGHTBOX =====
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const closeBtn = document.querySelector(".close");

let scale = 1;
let posX = 0;
let posY = 0;
let isDragging = false;
let startX, startY;

// OPEN IMAGE
images.forEach(img=>{
    img.addEventListener("click",()=>{

        lightbox.classList.add("active");

        lightboxImg.src = img.src;

        scale = 1;
        posX = 0;
        posY = 0;

        lightboxImg.style.transform =
        `translate(0px,0px) scale(1)`;

    });
});

// CLOSE BUTTON
closeBtn.addEventListener("click",()=>{
    lightbox.classList.remove("active");
});

// CLICK OUTSIDE TO CLOSE
lightbox.addEventListener("click",(e)=>{
    if(e.target===lightbox){
        lightbox.classList.remove("active");
    }
});

// ZOOM IN / OUT
lightboxImg.addEventListener("wheel",(e)=>{

    e.preventDefault();

    if(e.deltaY<0){
        scale += 0.2;
    }
    else{
        scale -= 0.2;
    }

    if(scale<1) scale=1;
    if(scale>5) scale=5;

    lightboxImg.style.transform =
    `translate(${posX}px,${posY}px) scale(${scale})`;

});

// DRAG IMAGE
lightboxImg.addEventListener("mousedown",(e)=>{

    isDragging=true;

    startX = e.clientX-posX;
    startY = e.clientY-posY;

    lightboxImg.style.cursor="grabbing";

});

document.addEventListener("mousemove",(e)=>{

    if(!isDragging) return;

    posX = e.clientX-startX;
    posY = e.clientY-startY;

    lightboxImg.style.transform =
    `translate(${posX}px,${posY}px) scale(${scale})`;

});

document.addEventListener("mouseup",()=>{

    isDragging=false;

    lightboxImg.style.cursor="grab";

});
</script>

<div class="lightbox" id="lightbox">

<span class="close">&times;</span>

<img id="lightbox-img">

</div>

</body>
</html>
